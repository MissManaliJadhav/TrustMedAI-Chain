apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: trustmedai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: trustmedai/backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: trustmedai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: trustmedai-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: trustmedai-secrets
                  key: jwt-secret
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: trustmedai
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
